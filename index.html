<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAC Custom Board</title>
    <style>
        :root { --primary-color: #00cc44; --border-color: #ccc; --bg-color: #f9f9f9; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-color); }
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; box-sizing: border-box; padding: 15px; }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; flex-shrink: 0; }
        .admin-toggle-btn { background-color: #666; color: white; border: none; padding: 8px 14px; font-size: 13px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .admin-toggle-btn.editing { background-color: #ff9900; }
        .creator-panel { display: none; background: #fff; padding: 15px; border-radius: 12px; border: 2px dashed #ff9900; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .creator-form { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
        .form-group { flex: 1; min-width: 180px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 13px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; }
        .panel-sections-container { width: 100%; display: flex; gap: 12px; margin-top: 12px; }
        button.action-btn { padding: 10px; font-size: 13px; font-weight: bold; color: white; border: none; border-radius: 6px; cursor: pointer; }
        #addCardBtn { background-color: var(--primary-color); }
        #clearBoardBtn { background-color: #ff3333; }
        .backup-btn { background-color: #4a90e2; }
        .main-layout { display: flex; gap: 15px; flex-grow: 1; overflow: hidden; }
        .sidebar-tabs { background: white; border: 1px solid var(--border-color); border-radius: 18px; padding: 15px; width: 150px; overflow-y: auto; }
        .tab-row { display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; padding: 5px; }
        .tab-item.active { color: var(--primary-color); font-weight: bold; }
        .board-chassis { flex-grow: 1; background: white; border: 1px solid var(--border-color); border-radius: 25px; padding: 15px; display: flex; }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%; height: 100%; }
        .grid-slot { border: 2px dashed #e0e0e0; border-radius: 15px; display: flex; justify-content: center; align-items: center; }
        .aac-card { width: 90%; height: 90%; text-align: center; cursor: pointer; }
        .aac-card img { width: 100%; height: 70%; object-fit: contain; }
    </style>
</head>
<body>

<div class="app-header">
    <h1 id="mainTitle">AAC Board</h1>
    <button id="adminToggleBtn" class="admin-toggle-btn">⚙️ Setup / Edit</button>
</div>

<div id="creatorPanel" class="creator-panel">
    <div class="creator-form">
        <div class="form-group"><label>Board Title</label><input type="text" id="boardTitle"></div>
        <div class="form-group"><label>Card Word</label><input type="text" id="cardWord"></div>
        <div class="form-group"><label>Image</label><input type="file" id="cardImage" accept="image/*"></div>
        <div class="panel-sections-container">
            <button id="addCardBtn" class="action-btn">Add Card</button>
            <button id="clearBoardBtn" class="action-btn">Clear All</button>
        </div>
    </div>
</div>

<div class="main-layout">
    <div id="sidebarTabs" class="sidebar-tabs"></div>
    <div class="board-chassis">
        <div id="gridDisplay" class="grid-container"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'aac_multi_canvas_system';
    let appState = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { activeBoardId: null, boards: [] };
    
    // Elementos
    const addCardBtn = document.getElementById('addCardBtn');
    const boardTitleInput = document.getElementById('boardTitle');
    const cardWordInput = document.getElementById('cardWord');
    const cardImageInput = document.getElementById('cardImage');
    const adminToggleBtn = document.getElementById('adminToggleBtn');
    const creatorPanel = document.getElementById('creatorPanel');

    // Funções Core
    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appState)); }

    async function loadSampleBoard() {
        try {
            const response = await fetch('sample_pt-BR.json');
            if (!response.ok) return;
            appState = await response.json();
            saveState();
            renderBoard();
        } catch (err) { console.warn("Exemplo não encontrado."); }
    }

    function renderBoard() {
        const sidebar = document.getElementById('sidebarTabs');
        sidebar.innerHTML = "";
        appState.boards.forEach(b => {
            const div = document.createElement('div');
            div.className = 'tab-row';
            div.innerHTML = `<span class="tab-item ${b.id === appState.activeBoardId ? 'active' : ''}">${b.title}</span>`;
            div.onclick = () => { appState.activeBoardId = b.id; saveState(); renderBoard(); };
            sidebar.appendChild(div);
        });

        const activeBoard = appState.boards.find(b => b.id === appState.activeBoardId);
        const grid = document.getElementById('gridDisplay');
        grid.innerHTML = "";
        for (let i = 0; i < 16; i++) {
            const slot = document.createElement('div');
            slot.className = 'grid-slot';
            if (activeBoard && activeBoard.cards[i]) {
                const c = activeBoard.cards[i];
                slot.innerHTML = `<div class="aac-card" onclick="speak('${c.word}')"><h3>${c.word}</h3><img src="${c.image}"></div>`;
            }
            grid.appendChild(slot);
        }
    }

    function speak(text) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(text)); }

    // Eventos
    adminToggleBtn.onclick = () => { 
        creatorPanel.style.display = creatorPanel.style.display === 'block' ? 'none' : 'block'; 
    };

    addCardBtn.onclick = () => {
        const title = boardTitleInput.value.trim();
        const word = cardWordInput.value.trim();
        const file = cardImageInput.files[0];
        if (!title || !word || !file) return alert("Preencha tudo!");

        const reader = new FileReader();
        reader.onload = (e) => {
            let board = appState.boards.find(b => b.title === title);
            if (!board) {
                board = { id: 'b_' + Date.now(), title, cards: [] };
                appState.boards.push(board);
                appState.activeBoardId = board.id;
            }
            board.cards.push({ id: 'c_' + Date.now(), word, image: e.target.result });
            saveState();
            renderBoard();
        };
        reader.readAsDataURL(file);
    };

    // Inicialização
    if (appState.boards.length === 0) {
        loadSampleBoard();
    } else {
        renderBoard();
    }
</script>
</body>
</html>
