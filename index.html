<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAC Custom Board</title>
  <style>
    /* Mantenha todo o seu CSS original aqui */
  </style>
</head>
<body ontouchstart="">

  <div class="app-header">
    <h1 id="mainTitle">AAC Board</h1>
    <button id="adminToggleBtn" class="admin-toggle-btn">⚙️ Setup / Edit</button>
  </div>
  <script>
    const STORAGE_KEY = 'aac_multi_canvas_system';
    let currentLang = {}; 
    let appState = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { activeBoardId: null, boards: [] };
    let isEditMode = false;

    // --- BLOCO DE INICIALIZAÇÃO CORRIGIDO ---
    document.addEventListener("DOMContentLoaded", async () => {
        // 1. Carrega as traduções primeiro
        await loadLocalization();
        
        // 2. Carrega o exemplo APENAS se não houver nada no localStorage
        await loadSampleBoard();
        
        // 3. Renderiza a interface agora que os dados estão garantidos
        renderBoard();
        
        // 4. Seus eventos originais (inicialize-os aqui ou mantenha onde já estão)
        setupEventListeners(); 
        window.addEventListener('resize', adjustFontSize);
    });

    async function loadLocalization() {
      try {
        const response = await fetch('languages.json');
        const data = await response.json();
        const userLang = (navigator.language || "en").substring(0, 2);
        currentLang = data[userLang] || data.en;
        initStaticTexts();
      } catch (e) { console.error("Erro ao carregar idiomas"); }
    }

    async function loadSampleBoard() {
      if (appState.boards.length === 0) {
        const userLang = (navigator.language || "en").substring(0, 2);
        try {
          // Busca o arquivo dinâmico baseado no idioma (ex: sample_pt.json)
          let response = await fetch(`sample_${userLang}.json`);
          
          if (!response.ok) {
            console.log("Arquivo de idioma não encontrado, carregando fallback...");
            response = await fetch('sample_en.json');
          }
          
          const sampleData = await response.json();
          appState = sampleData;
          saveState();
        } catch (error) {
          console.error("Falha ao carregar o arquivo de exemplo:", error);
        }
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
    }

    // --- MANTENHA SUAS OUTRAS FUNÇÕES ORIGINAIS ABAIXO ---
    function renderBoard() {
      // ... sua lógica original ...
    }

    function initStaticTexts() {
      // ... sua lógica original ...
    }

    function speakWord(text) {
      // ... sua lógica original ...
    }
    
    // Certifique-se de que sua função setupEventListeners existe 
    // ou mova seus addEventListeners para aqui.
    function setupEventListeners() {
       adminToggleBtn.addEventListener('click', () => {
        isEditMode = !isEditMode;
        creatorPanel.style.display = isEditMode ? "block" : "none";
        renderBoard();
      });
      // ... todos os seus outros eventos ...
    }
    
  </script>
</body>
</html>
